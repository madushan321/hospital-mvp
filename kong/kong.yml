_format_version: "3.0"
_transform: true

services:
  - name: patient-service
    url: http://patient-service:8081
    routes:
      - name: patient-route
        paths:
          - /patients
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Requested-With
          credentials: true
          max_age: 3600

